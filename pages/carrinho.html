<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Carrinho | PrimeKicks</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="../img/logo.jpg" alt="Logo PrimeKicks" class="logo">
                <h1>PrimeKicks</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#product-grid">Produtos</a></li>
                    <li class="cart-menu">
                        <a href="carrinho.html" id="cart-icon">Carrinho (<span id="cart-count">0</span>)</a>
                        <div id="cart-dropdown" class="hidden">
                        </div>
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="cart-section">
                <h2 class="section-title">Seu Carrinho</h2>
                <div id="cart-items" class="cart-items-container">
                    <!-- Itens do carrinho serão injetados aqui via JS -->
                    <p>Carregando carrinho...</p>
                </div>
                <div class="cart-summary">
                    <p>Total: <span id="cart-total">R$ 0,00</span></p>
                    <button id="clear-cart-btn" class="clear-cart-btn">Limpar Carrinho</button>
                    <button id="checkout-btn" class="add-to-cart-btn">Finalizar Compra</button>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>Contato: contato@primekicks.com</p>
                <p>Endereço: Rua dos Tênis, 123 - São Paulo, SP</p>
            </div>
            <p>&copy; 2026 PrimeKicks. Todos os direitos reservados.</p>
        </footer>
    </div>
    <script src="../script/script.js"></script>
</body>
</html>
