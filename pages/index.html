<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home.css">
    <title>PrimeKicks | Sua Loja de Tênis</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="../img/logo.jpg" alt="Logo PrimeKicks" class="logo">
                <h1>PrimeKicks</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html#hero">Home</a></li>
                    <li><a href="index.html#product-grid">Produtos</a></li>
                    <li class="cart-menu">
                        <a href="carrinho.html" id="cart-icon">Carrinho (<span id="cart-count">0</span>)</a>
                        <div id="cart-dropdown" class="hidden">
                        </div>
                    </li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="hero" class="hero">
                <h2>Bem-vindo à PrimeKicks!</h2>
                <p>Estilo e conforto para os seus pés.</p>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Busque seu tênis favorito...">
                </div>
            </section>

            <section class="catalog">
                <h2 class="section-title">Nossos Lançamentos</h2>
                <div id="product-grid" class="product-grid">
                    <!-- Os produtos serão injetados aqui via JS -->
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>Contato: contato@primekicks.com</p>
                <p>Endereço: Rua dos Tênis, 123 - São Paulo, SP</p>
            </div>
            <p>&copy; 2026 PrimeKicks. Todos os direitos reservados.</p>
        </footer>

    </div>
    <script src="../script/script.js"></script>
</body>
</html>
